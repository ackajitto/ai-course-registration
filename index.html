<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>โครงการบรรพชาสามเณร - ระบบจองและแอดมิน</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #FDFBF7; }
    .animate-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const Icon = ({ d, size = 16, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {Array.isArray(d) ? d.map((path, i) => <path key={i} d={path}/>) : <path d={d}/>}
      </svg>
    );

    const ICONS = {
      calendar: "M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z",
      check: "M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4 12 14.01l-3-3",
      x: "M18 6 6 18M6 6l12 12",
      settings: "M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2zM12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"
    };

    // สมมติว่ามีคนจองเข้ามารอการยืนยัน
    const INITIAL_BOOKINGS = {
      '2026-04-01-breakfast': { mainHost: { status: 'booked', name: 'คุณใจบุญ กุศลทาน' } },
      '2026-04-05-lunch': { mainHost: { status: 'pending', name: 'คุณสมชาย ใจดี' } } // รอแอดมินกดรับ
    };

    function App() {
      const [bookings, setBookings] = useState(INITIAL_BOOKINGS);
      const [isAdminMode, setIsAdminMode] = useState(false); // สถานะเปิดปิดหน้าแอดมิน

      // ฟังก์ชันสำหรับแอดมินกดยืนยัน (Approve)
      const handleApprove = (slotKey) => {
        setBookings(prev => ({
          ...prev,
          [slotKey]: {
            ...prev[slotKey],
            mainHost: { ...prev[slotKey].mainHost, status: 'booked' } // เปลี่ยนจาก pending เป็น booked
          }
        }));
      };

      // ฟังก์ชันสำหรับแอดมินกดยกเลิก (Reject)
      const handleReject = (slotKey) => {
        if(window.confirm('แน่ใจหรือไม่ที่จะลบรายการจองนี้?')) {
          setBookings(prev => {
            const newBookings = { ...prev };
            delete newBookings[slotKey].mainHost;
            return newBookings;
          });
        }
      };

      // ฟังก์ชันดึงรายการที่รอการยืนยันทั้งหมดมาแสดงให้แอดมินเห็น
      const getPendingBookings = () => {
        let pending = [];
        Object.keys(bookings).forEach(key => {
          if (bookings[key].mainHost?.status === 'pending') {
            pending.push({ key, ...bookings[key].mainHost });
          }
        });
        return pending;
      };

      return (
        <div className="min-h-screen relative pb-20">
          
          {/* ================= ส่วนของแอดมิน (Admin Panel) ================= */}
          {isAdminMode ? (
            <div className="max-w-5xl mx-auto p-6 mt-10">
              <div className="flex justify-between items-center mb-6 border-b pb-4">
                <h1 className="text-3xl font-bold text-gray-800">⚙️ ระบบจัดการหลังบ้าน (Admin)</h1>
                <button onClick={() => setIsAdminMode(false)} className="bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600">
                  กลับไปหน้าร้าน (User View)
                </button>
              </div>

              <div className="bg-white rounded-xl shadow-md p-6">
                <h2 className="text-xl font-bold mb-4 text-orange-600">🟡 รายการรอการตรวจสอบ (สลิป/หลักฐาน)</h2>
                
                {getPendingBookings().length === 0 ? (
                  <p className="text-gray-500 text-center py-8">ไม่มีรายการรอตรวจสอบในขณะนี้ 🎉</p>
                ) : (
                  <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse">
                      <thead>
                        <tr className="bg-gray-100 text-gray-700">
                          <th className="p-3 border-b">รหัสวันที่/มื้อ</th>
                          <th className="p-3 border-b">ชื่อผู้จอง</th>
                          <th className="p-3 border-b">สถานะ</th>
                          <th className="p-3 border-b">การจัดการ</th>
                        </tr>
                      </thead>
                      <tbody>
                        {getPendingBookings().map((item) => (
                          <tr key={item.key} className="hover:bg-gray-50">
                            <td className="p-3 border-b font-medium">{item.key}</td>
                            <td className="p-3 border-b">{item.name}</td>
                            <td className="p-3 border-b">
                              <span className="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-sm font-bold">รอตรวจสอบ</span>
                            </td>
                            <td className="p-3 border-b flex gap-2">
                              <button onClick={() => handleApprove(item.key)} className="bg-green-500 hover:bg-green-600 text-white px-3 py-1 rounded shadow-sm text-sm flex items-center gap-1">
                                <Icon d={ICONS.check} size={14} /> อนุมัติ
                              </button>
                              <button onClick={() => handleReject(item.key)} className="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded shadow-sm text-sm flex items-center gap-1">
                                <Icon d={ICONS.x} size={14} /> ยกเลิก
                              </button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            </div>
          ) : (
            /* ================= ส่วนของหน้าร้าน (User View) ย่อให้ดูง่ายขึ้น ================= */
            <div className="max-w-3xl mx-auto mt-10 p-6 text-center">
              <h1 className="text-4xl font-bold mb-8">โครงการบรรพชาสามเณร (หน้าร้าน)</h1>
              
              <div className="grid grid-cols-2 gap-4">
                {/* จำลองการแสดงผลบนตาราง */}
                <div className={`p-6 rounded-xl border ${bookings['2026-04-01-breakfast']?.mainHost?.status === 'booked' ? 'bg-green-100 border-green-300' : 'bg-white'}`}>
                  <h3 className="font-bold">วันที่ 1 เม.ย. (มื้อเช้า)</h3>
                  <p className="mt-2 text-green-700 font-medium">เจ้าภาพ: {bookings['2026-04-01-breakfast']?.mainHost?.name || '-'}</p>
                </div>
                
                <div className={`p-6 rounded-xl border ${bookings['2026-04-05-lunch']?.mainHost?.status === 'booked' ? 'bg-green-100 border-green-300' : 'bg-yellow-100 border-yellow-300'}`}>
                  <h3 className="font-bold">วันที่ 5 เม.ย. (มื้อเพล)</h3>
                  <p className="mt-2 text-yellow-700 font-medium">เจ้าภาพ: {bookings['2026-04-05-lunch']?.mainHost?.name || 'รอคนจอง'}</p>
                  <p className="text-xs text-red-500 mt-1">(ตอนนี้อยู่ในสถานะ: {bookings['2026-04-05-lunch']?.mainHost?.status})</p>
                </div>
              </div>
              
              <p className="mt-10 text-gray-500">จำลองการจอง: ลองกดสลับโหมดไปที่ Admin แล้วกด "อนุมัติ" ดูสิคะ ชื่อจะกลายเป็นสีเขียวทันที!</p>
            </div>
          )}

          {/* ปุ่มลับสำหรับเปิดโหมด Admin มุมขวาล่าง */}
          <button 
            onClick={() => setIsAdminMode(!isAdminMode)}
            className="fixed bottom-5 right-5 bg-slate-900 text-white p-4 rounded-full shadow-2xl hover:bg-slate-800 transition-all z-50 flex items-center gap-2 font-bold"
          >
            <Icon d={ICONS.settings} size={20} />
            {isAdminMode ? 'ดูหน้าร้าน' : 'เข้าสู่ระบบแอดมิน'}
          </button>
          
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
